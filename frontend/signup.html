<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AnthropicBots E-Commerce</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/auth.css">

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >
</head>

<body>

    <div id="navbar"></div>

    <section class="auth-container">

        <div class="auth-box">

            <h2>Create Account</h2>

            <p>Join AnthropicBots E-Commerce</p>

            <form id="signup-form">

                <input
                    type="text"
                    id="signup-name"
                    placeholder="Full Name"
                    required
                >

                <input
                    type="email"
                    id="signup-email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    id="signup-password"
                    placeholder="Password"
                    required
                >

                <button type="submit" class="auth-btn">
                    Create Account
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="social-btn google-btn" id="google-login">

                <i class="fab fa-google"></i>

                Continue with Google

            </button>

            <button class="social-btn github-btn" id="github-login">

                <i class="fab fa-github"></i>

                Continue with GitHub

            </button>

            <button class="social-btn apple-btn" id="apple-login">

                <i class="fab fa-apple"></i>

                Continue with Apple

            </button>

            <p class="auth-switch">

                Already have an account?

                <a href="signin.html">Sign In</a>

            </p>

        </div>

    </section>

    <div id="footer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="scripts/components.js"></script>

    <script src="scripts/auth.js"></script>

</body>
</html>
