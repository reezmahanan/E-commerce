repo: "AnthropicBots/E-commerce"

workflows:

  # ── Onboarding ────────────────────────────────────────────
  onboarding:
    enabled: true
    check_human_contributors: true
    require_signed_cla: false
    minimum_account_age_days: 0
    minimum_public_contributions: 0
    auto_assign_mentor: false
    mentor_assignment_strategy: round-robin
    welcome_message: |
      Welcome to our E-commerce project! 🎉
      Thanks for contributing. Please read CONTRIBUTING.md before getting started.
    onboarding_checklist:
      - Read CONTRIBUTING.md
      - Sign your commits (DCO)

  # ── Pull Request quality gates ──────────────────────────────
  pull_request:
    enabled: true
    auto_label: true
    stale_pr_days: 30
    auto_close_stale: false
    reviewer_recommendation: true
    quality_gates:
      require_dco: false
      require_linked_issue: true
      require_tests: false
    ai_review:
      enabled: false

  # ── Auto-assign reviewers (new feature — OFF for now, flip to true later) ──
  reviewer_assignment:
    enabled: false
    availability_file: ".github/reviewers.yml"
    reviewers_count: 1
    strategy: round-robin
    exclude_pr_author: true
    fallback_to_all_if_none_available: true
    notify_comment: off

  # ── PR Health Scoring ────────────────────────────────────────
  pr_health:
    enabled: true
    comment_threshold: 60
    label_healthy_above: 75

  # ── Contributor Progression ─────────────────────────────────
  progression:
    enabled: true
    recommend_issues_after_merge: true
    recommendation_count: 3
    celebrate_milestones: true

  # ── Issue Management ────────────────────────────────────────
  issue_management:
    enabled: true
    stale_issue_days: 30
    close_stale_after_days: 7
    auto_unassign_inactive_days: 14

permissions:
  global:
    label_command:
      allow:
        - maintainers
        - committers
        - collaborators
        - write_access
        - org_members
  fallback_policy:
    default_command_access: write_access
